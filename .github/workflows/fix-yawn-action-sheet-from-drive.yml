name: Fix yawn action sheet from Drive

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-yawn-action-sheet-from-drive.yml
      - pipeline/scripts/fix_yawn_action_sheet.py

permissions:
  contents: write
  pull-requests: read

jobs:
  fix-yawn-action-sheet:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'codex-action-sprite-sheets'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex-action-sprite-sheets
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow numpy scipy

      - name: Regenerate yawn action sheet
        run: python pipeline/scripts/fix_yawn_action_sheet.py

      - name: Validate manifest and action sprite sheets
        run: make validate

      - name: Commit fixed yawn action sheet and cleanup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix yawn action sprite sheet
          branch: codex-action-sprite-sheets
          file_pattern: templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/frames/yawn/yawn-20f-sheet.png templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/ACTION_SPRITE_MAP.md .github/workflows/fix-yawn-action-sheet-from-drive.yml pipeline/scripts/fix_yawn_action_sheet.py
