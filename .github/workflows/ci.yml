name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  macos-template:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        run: make validate
      - name: Build Swift template
        run: make build
      - name: Package app bundle
        run: make package
      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: Lovely-Pet-macOS
          path: templates/macos-desktop-pet/dist/Lovely-Pet-macOS.zip
          if-no-files-found: error
