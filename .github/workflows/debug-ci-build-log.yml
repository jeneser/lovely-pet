name: Debug CI build log

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/debug-ci-build-log.yml
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Capture build log
        shell: bash
        run: |
          set +e
          make build > /tmp/lovely-pet-build.log 2>&1
          status=$?
          tail -n 200 /tmp/lovely-pet-build.log
          exit $status
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-log
          path: /tmp/lovely-pet-build.log
