name: Import high-res pet assets

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/import-highres-assets.yml
      - pipeline/scripts/import-highres-assets.sh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/smoother-pet-frame-transitions
      - run: bash pipeline/scripts/import-highres-assets.sh
