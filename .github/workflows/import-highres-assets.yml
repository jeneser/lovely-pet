name: Import high-res pet assets

on:
  push:
    branches:
      - codex/smoother-pet-frame-transitions
    paths:
      - .github/workflows/import-highres-assets.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/import-highres-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-highres-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download high-res asset package from Google Drive
        env:
          DRIVE_FILE_ID: 1i7J-j1i32F1ygFTG9n8qQlCCP87PCp8j
        run: |
          set -euo pipefail
          url="https://drive.google.com/uc?export=download&id=${DRIVE_FILE_ID}"
          curl -L --fail --retry 3 --retry-delay 2 "$url" -o /tmp/pet-frame-smooth-sheets.zip
          file /tmp/pet-frame-smooth-sheets.zip
          unzip -t /tmp/pet-frame-smooth-sheets.zip

      - name: Apply high-res assets without downsampling
        run: |
          set -euo pipefail
          unzip -o /tmp/pet-frame-smooth-sheets.zip -d .
          python3 pipeline/scripts/validate-pet-manifest.py templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/pet.json
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image
          expected = {
              'idle': (4800, 340),
              'hover': (2560, 340),
              'tap': (3200, 340),
              'sleep': (2240, 340),
          }
          root = Path('templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/frames')
          for state, size in expected.items():
              path = root / state / 'sheet.png'
              actual = Image.open(path).size
              if actual != size:
                  raise SystemExit(f'{path} expected {size}, got {actual}')
          PY

      - name: Commit imported high-res assets
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/import-highres-assets.yml
          git add pipeline/scripts/validate-pet-manifest.py templates/macos-desktop-pet/Sources/LovelyPetApp templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default
          if git diff --cached --quiet; then
            echo "No asset changes to commit."
            exit 0
          fi
          git commit -m "Replace pet sheets with high-res assets"
          git push
