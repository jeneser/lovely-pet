name: Import high-res pet assets

on:
  push:
    branches:
      - codex/smoother-pet-frame-transitions
    paths:
      - .github/workflows/import-highres-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-highres-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/smoother-pet-frame-transitions

      - name: Download high-res asset package from public Drive
        env:
          DRIVE_FILE_ID: 1i7J-j1i32F1ygFTG9n8qQlCCP87PCp8j
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from urllib.request import build_opener, HTTPCookieProcessor
          import http.cookiejar
          import sys

          file_id = '1i7J-j1i32F1ygFTG9n8qQlCCP87PCp8j'
          target = Path('/tmp/pet-frame-smooth-sheets.zip')
          opener = build_opener(HTTPCookieProcessor(http.cookiejar.CookieJar()))
          url = f'https://drive.google.com/uc?export=download&id={file_id}'
          data = opener.open(url, timeout=60).read()
          if not data.startswith(b'PK'):
              marker = b'confirm='
              pos = data.find(marker)
              if pos != -1:
                  token = data[pos + len(marker):pos + len(marker) + 64].split(b'&')[0].split(b'"')[0].decode('utf-8', 'ignore')
                  data = opener.open(f'{url}&confirm={token}', timeout=60).read()
          if not data.startswith(b'PK'):
              target.with_suffix('.html').write_bytes(data[:20000])
              raise SystemExit('Google Drive response was not a zip file; check public link access')
          target.write_bytes(data)
          print(f'downloaded {target} ({target.stat().st_size} bytes)')
          PY
          unzip -t /tmp/pet-frame-smooth-sheets.zip

      - name: Apply high-res assets without downsampling
        run: |
          set -euo pipefail
          unzip -o /tmp/pet-frame-smooth-sheets.zip -d .
          python3 - <<'PY'
          from pathlib import Path
          path = Path('templates/macos-desktop-pet/Sources/LovelyPetApp/FrameAnimationPlayer.swift')
          text = path.read_text()
          text = text.replace('x: frameIndex * frameWidth,', 'x: CGFloat(frameIndex * frameWidth),')
          text = text.replace('width: frameWidth,', 'width: CGFloat(frameWidth),')
          text = text.replace('height: frameHeight', 'height: CGFloat(frameHeight)')
          text = text.replace('NSSize(width: frameWidth, height: CGFloat(frameHeight))', 'NSSize(width: CGFloat(frameWidth), height: CGFloat(frameHeight))')
          text = text.replace('NSSize(width: frameWidth, height: frameHeight)', 'NSSize(width: CGFloat(frameWidth), height: CGFloat(frameHeight))')
          path.write_text(text)
          PY
          python3 pipeline/scripts/validate-pet-manifest.py templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/pet.json
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image
          expected = {
              'idle': (4800, 340),
              'hover': (2560, 340),
              'tap': (3200, 340),
              'sleep': (2240, 340),
          }
          root = Path('templates/macos-desktop-pet/Sources/LovelyPetApp/Resources/pets/default/frames')
          for state, size in expected.items():
              path = root / state / 'sheet.png'
              actual = Image.open(path).size
              if actual != size:
                  raise SystemExit(f'{path} expected {size}, got {actual}')
              print(f'{path}: {actual}')
          PY

      - name: Commit high-res assets
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/import-highres-assets.yml
          git add pipeline/scripts/validate-pet-manifest.py templates/macos-desktop-pet/Sources/LovelyPetApp
          if git diff --cached --quiet; then
            echo "No high-res asset changes to commit."
            exit 0
          fi
          git commit -m "Replace pet sheets with high-res assets"
          git push
