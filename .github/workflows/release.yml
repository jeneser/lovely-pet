name: Release Lovely Pet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        run: make validate
      - name: Package app bundle
        run: make package
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Lovely Pet ${{ github.event.inputs.tag }}
          files: templates/macos-desktop-pet/dist/Lovely-Pet-macOS.zip
          prerelease: true
