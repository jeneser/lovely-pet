name: apply image animation patch

on:
  push:
    branches:
      - codex/image-frame-animation-dock-walk

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: "${{ !contains(github.event.head_commit.message, 'feat: image frame animation and Dock walk') }}"
    runs-on: macos-14
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install asset generator dependencies
        run: python -m pip install --upgrade pillow

      - name: Apply image-frame animation patch
        run: |
          python - <<'PY_PAYLOAD'
          import base64
          import gzip
          from pathlib import Path

          payload_dir = Path('.github/patch_payload_v2')
          chunks = []
          for path in sorted(payload_dir.iterdir(), key=lambda item: item.name):
              if path.suffix == '.b64':
                  chunks.append(path.read_text().strip())
              elif path.suffix == '.codes':
                  chunks.append(''.join(chr(int(value)) for value in path.read_text().replace('\n', '').split(',') if value))
          payload = ''.join(chunks)
          Path('/tmp/apply_lovely_pet_patch.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY_PAYLOAD
          python /tmp/apply_lovely_pet_patch.py
          rm -f .github/workflows/apply-image-animation-patch.yml
          rm -rf .github/patch_payload .github/patch_payload_v2

      - name: Validate and build
        run: |
          make validate
          make compat
          make build

      - name: Commit generated implementation
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feat: image frame animation and Dock walk"
          git push origin "HEAD:${BRANCH}"

      - name: Open draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BODY_FILE="$(mktemp)"
          cat > "${BODY_FILE}" <<'EOF'
          ## Summary
          - remove the SwiftUI procedural ragdoll renderer path and make the sample asset-backed only
          - replace Timer frame playback with CVDisplayLink pacing, transition frames, and frame preloading
          - add generated transparent PNG sequences for idle, hover, tap, sleep, walk_right, walk_left, and transitions
          - add Dock-level window placement plus a menu-controlled Dock walk mode
          - update README and project docs to match the image-asset runtime

          ## Validation
          - make validate
          - make compat
          - make build
          EOF
          if gh pr view "${BRANCH}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh pr edit "${BRANCH}" --repo "${{ github.repository }}" --title "[codex] image frame animation and Dock walk" --body-file "${BODY_FILE}"
          else
            gh pr create --repo "${{ github.repository }}" --base main --head "${BRANCH}" --draft --title "[codex] image frame animation and Dock walk" --body-file "${BODY_FILE}"
          fi
