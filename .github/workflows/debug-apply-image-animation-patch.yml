name: debug apply image animation patch

on:
  push:
    branches:
      - codex/image-frame-animation-dock-walk

permissions:
  contents: write

jobs:
  debug-apply:
    if: "${{ !contains(github.event.head_commit.message, 'debug apply output') && !contains(github.event.head_commit.message, 'feat: image frame animation and Dock walk') }}"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pillow
      - name: apply payload and collect output
        run: |
          set +e
          mkdir -p .github/debug
          python - <<'PY'
          import base64, gzip
          from pathlib import Path
          payload_dir = Path('.github/patch_payload_v2')
          chunks = []
          for path in sorted(payload_dir.iterdir(), key=lambda item: item.name):
              if path.suffix == '.b64':
                  chunks.append(path.read_text().strip())
              elif path.suffix == '.codes':
                  chunks.append(''.join(chr(int(value)) for value in path.read_text().replace('\n', '').split(',') if value))
          payload = ''.join(chunks)
          Path('/tmp/apply_lovely_pet_patch.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY
          python /tmp/apply_lovely_pet_patch.py >> .github/debug/apply-build.log 2>&1
          echo "apply_exit=$?" >> .github/debug/apply-build.log
          make validate >> .github/debug/apply-build.log 2>&1
          echo "validate_exit=$?" >> .github/debug/apply-build.log
          make compat >> .github/debug/apply-build.log 2>&1
          echo "compat_exit=$?" >> .github/debug/apply-build.log
          make build >> .github/debug/apply-build.log 2>&1
          echo "build_exit=$?" >> .github/debug/apply-build.log
          rm -f .github/workflows/apply-image-animation-patch.yml .github/workflows/debug-apply-image-animation-patch.yml
          rm -rf .github/patch_payload .github/patch_payload_v2
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short >> .github/debug/apply-build.log
          git add .github/debug/apply-build.log
          git commit -m "debug apply output"
          git push origin HEAD:${{ github.ref_name }}
